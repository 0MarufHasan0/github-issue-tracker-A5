<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- fav icon -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisy Ui + Tailwind -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font Geist -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


<!-- style -->
 <style>

    *{
        font-family: "Geist", sans-serif;
    }
 </style>
</head>
<body>

    <!-- Nav -->
    
<header class="mx-10">

<div>
    <div class="navbar flex-row bg-base-100 shadow-sm">
  <div class="flex-1">
    <div class="flex justify-start items-center w-[37px]">
        <img src="./assets/github-logo.png" alt="github-logo" srcset="">
    <a class="btn btn-ghost  text-[#1F2937] text-xl">GitHub Issues Tracker</a></div>
  </div>
  <div class="flex gap-2">

    <!-- search -->
    <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label>
    
         <button class="btn btn-primary">+ New Issue</button>
     
      
   
</div>
</div>



</div>


</header>



<main class="bg-primary min-h-screen w-full p-10" >


<!-- button -->
   <section class=" container mx-auto ">

        <div class="bg-white p-5 rounded-sm">
 
        <button id="btn-all" class="btn btn-primary " onclick="toggleBtn('btn-all')">All</button>
        <button id="btn-open" class="btn btn-outcome" onclick="toggleBtn('btn-open')">Open</button>
        <button id="btn-closed" class="btn btn-outcome" onclick="toggleBtn('btn-closed')">Closed</button>



        </div>

        </section>

    
     <!-- count div -->

     <section class=" container mx-auto  mt-10 rounded-sm border-b border-gray-300 bg-white p-10">

         <div class="flex justify-between items-center ">
        <div class="flex justify-center items-center gap-2">
           <img src="./assets/Aperture.png" alt="Aperture.png" class="h-[50px] w-[50px]">
            <div>
                 
                <h1 id="issue-count" class="text-[#1F2937] font-semibold"></h1>
                <p class="font-medium text-[#64748B]">Track and manage your project issues</p>

            </div>

        </div>

       <div class="flex items-center gap-4">
        <span class="h-4 w-4  rounded-full bg-green-500"></span>
        <p id="open">Open</p>

      <span class="h-4 w-4  rounded-full bg-purple-500"></span>
        <p id="closed">closed</p>
       </div>
       

       </div>

        <div id="loading-spinner" class="h-[60vh] pl-70  justify-center items-center hidden">
         <span class="loading loading-dots loading-xl"></span>
         </div>

       <!-- card div -->

        <div id="issue-card" class="grid grid-cols-1 md:grid-cols-3 gap-5 pt-30">

          <!-- issue card -->


<!-- loading spinner -->

       


        </div>

        

        
     </section>


<!-- count -->






   </section>
     

</main>




<!-- script -->
 <script src="./js/scipt.js"></script>

</body>
</html>
