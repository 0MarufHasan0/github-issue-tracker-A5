<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login page</title>

    <!-- fav icon -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisy Ui + Tailwind -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font Geist -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<!-- style -->
 <style>

    *{
        font-family: "Geist", sans-serif;
    }
 </style>

</head>
<body>
<!-- login From -->
<div class="min-h-screen max-w-md mx-auto pt-52">
    
    <div class="flex flex-col items-center justify-center ">
        <img src="./assets/github-logo.png" alt="">


    <h2 class="text-2xl font-bold mt-4" >GitHub Issues Tracker</h2>
    <p class="font-medium text-[#64748B]">Sign in to manage your issues</p>

    </div>
    <!-- from start -->

    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-4">


  <label class="label font-medium text-[16px] text-[#1F2937]">Username</label>
  <input id="input-username" type="text" class="input w-full" placeholder="Enter Username" />
  <span class="mb-2 text-[#4A00FF] text-[14px]">Default: admin</span>

  <label class="label  font-medium text-[16px] text-[#1F2937]">Password</label>
  <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />
  <span class=" text-[#4A00FF] text-[14px]">Default: admin123</span>

  <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>


  <!-- or -->


<div class="flex items-center gap-2 m-2">
    <div class="flex-1 border-t border-gray-300"></div>
    <p class=" text-center">Or</p>
      <div class="flex-1 border-t border-gray-300"></div>
</div>

<!-- Demo Credentials: -->
 <div class="text-center">
    <h6 class=" text-[#64748B]">Demo Credentials:</h6>
   <div class="mt-6 font-medium text-[16px] text-[#1F2937] ">
    <p>Username: admin</p>
    <p>Password: admin123</p>
   </div>
 </div>



</fieldset>






</div>


<!-- js script -->
 <script src="login.js"></script>

    
</body>
</html>
